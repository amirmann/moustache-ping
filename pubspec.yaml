name: moustache_ping
description: "Network utility app — ping, subnet scan, and speed test."
publish_to: 'none'

version: 1.0.12+13

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dart_ping: ^9.0.1
  network_tools: ^6.0.8
  network_tools_flutter: ^3.0.3
  network_info_plus: ^8.2.1
  connectivity_plus: ^5.0.2

  # Speed test
  flutter_internet_speed_test_pro: ^1.5.0

  # State management
  flutter_riverpod: ^3.3.2

  # Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # Utilities
  path_provider: ^2.1.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_ce_generator: ^1.8.0

flutter:
  uses-material-design: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
